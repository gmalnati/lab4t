# Tells the External Secrets Operator HOW to reach Vault and HOW to
# authenticate — using the exact Kubernetes-auth role you created in Vault.
# This object contains no secret value; it's pure wiring.
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: demo
spec:
  provider:
    vault:
      # In-cluster Vault service (namespace "vault", default port 8200).
      server: "http://vault.vault.svc:8200"
      # KV v2 engine mounted at "secret".
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"     # where the k8s auth method is enabled
          role: "app"                 # the Vault role bound to app-sa
          serviceAccountRef:
            name: "app-sa"
