# Declares WHICH secret the workload needs and WHERE to fetch it. ESO reads
# the value from Vault and materializes a native Kubernetes Secret named
# "db-credentials". The literal value never appears in this file or in Git.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: db-credentials
  namespace: demo
spec:
  # Short interval so the Step 6 rotation is observable in a lab. In real life
  # this is typically much longer (the slide shows 1h).
  refreshInterval: 1m
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: db-credentials      # the K8s Secret ESO will create
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD  # key inside the resulting K8s Secret
      remoteRef:
        key: dev/db           # path under the KV mount (secret/dev/db)
        property: DB_PASSWORD # the field within that secret
